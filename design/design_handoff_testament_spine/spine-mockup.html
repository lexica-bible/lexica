<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book spine — across themes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="static/styles.css"/>
  <style>
    body { margin: 0; font-family: var(--f-sans); background: var(--bg-sunk); min-height: 100vh; }
    .switch { display: flex; gap: 8px; justify-content: center; padding: 28px 0 0; }
    .switch button {
      font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 7px 14px; border: 1px solid var(--rule); border-radius: 999px;
      background: var(--bg); color: var(--ink-3); cursor: pointer;
    }
    .switch button[aria-pressed="true"] { color: var(--ink); border-color: var(--accent); background: var(--accent-soft); }
    .wrap { display: flex; justify-content: center; padding: 28px 40px 40px; }
    .rail { width: 300px; background: var(--bg); border: 1px solid var(--rule); border-radius: 14px; padding: 6px 0 14px; box-shadow: var(--shadow-md); }
  </style>
</head>
<body>
  <div class="switch">
    <button data-set="light" aria-pressed="true">Light</button>
    <button data-set="sepia" aria-pressed="false">Sepia</button>
    <button data-set="dark" aria-pressed="false">Dark</button>
  </div>
  <div class="wrap">
    <div class="rail" data-rail></div>
  </div>
  <script>
    function book(name, ch) {
      return `<button class="nav-book"><span class="nav-book-name">${name}</span><span class="nav-book-count">${ch}</span></button>`;
    }
    const RAIL = `
      <div class="nav-group nav-group--ot">
        <div class="nav-div"><span class="nav-div-n">Minor Prophets</span></div>
        ${book("Zephaniah", 3)}
        ${book("Haggai", 2)}
        ${book("Zechariah", 14)}
        ${book("Malachi", 4)}
      </div>
      <div class="nav-group nav-group--nt nav-group--tnew">
        <div class="nav-testament">New Testament</div>
        <div class="nav-div"><span class="nav-div-n">Gospels</span></div>
        ${book("Matthew", 28)}
        ${book("Mark", 16)}
        ${book("Luke", 24)}
        ${book("John", 21)}
      </div>
      <div class="nav-group nav-group--nt">
        <div class="nav-div"><span class="nav-div-n">Pauline Epistles</span></div>
        ${book("Romans", 16)}
        ${book("1 Corinthians", 16)}
        ${book("Galatians", 6)}
      </div>`;
    document.querySelector("[data-rail]").innerHTML = RAIL;

    document.querySelectorAll(".switch button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.documentElement.dataset.theme = btn.dataset.set;
        document.querySelectorAll(".switch button").forEach(b =>
          b.setAttribute("aria-pressed", String(b === btn)));
      });
    });
  </script>
</body>
</html>
