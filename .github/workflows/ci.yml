# Lexica CI — runs on every push and pull request.
# Two cheap checks, no database needed:
#   1. tests   — the invariant tests (they build their own fake data in memory)
#   2. frontend — rebuild app.js from source and confirm the committed copy matches
name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install flask anthropic python-dotenv flask-limiter
      - name: Run invariant tests
        run: |
          python tests/test_strongs_join.py
          python tests/test_build_invariants.py
          python tests/test_folded_fixes.py
          python tests/test_argmap.py
          python tests/test_versification.py
          python tests/test_corpus_panel.py
          python tests/test_synthesis_no_leak.py
          python tests/test_typed_strongs.py
          python tests/test_render_head_no_phantom.py
          python tests/test_lexica_agreement_parse.py
          python tests/test_lexica_glossset_fold.py
          python tests/test_lexica_detectors.py
          python tests/test_draw_hints.py
          python tests/test_lexica_section_split.py
          python tests/test_section_matcher_sweep.py
          python tests/test_ref_tail_expansion.py
          python tests/test_coverage_gate.py
          python tests/test_repair_pass.py
          python tests/test_v11_probes.py
          python tests/test_fix_lexica_raw.py
          python tests/test_offline_gate_lints.py
          python tests/test_quote_repair.py
          python tests/test_draw_history.py
          python tests/test_helper_double_tag.py
          python tests/test_context_feed.py
          python tests/test_prompt_contract.py
          python tests/test_written_ranges.py
          python tests/test_news_gate.py
          python tests/test_key_strongs_filter.py
          python tests/test_tipnr_roster.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install build tools
        run: npm ci
      - name: Rebuild app.js
        run: npm run build
      - name: Check the committed app.js is up to date
        run: |
          if ! git diff --quiet -- static/app.js; then
            echo "::error::static/app.js is stale — run 'npm run build' and commit the result."
            git diff -- static/app.js
            exit 1
          fi
          echo "app.js matches the source. Good."
      - name: Run node unit tests (frontend pure logic)
        run: |
          node tests/test_ac_word_groups.js
          node tests/test_ac_cited_set.js
          node tests/test_rstack_logic.js
          node tests/test_note_inspect.js
          node tests/test_chrono_reconcile.js
          node tests/test_library_order.js
          node tests/test_render_markup.js
          node tests/smoke_app.js
